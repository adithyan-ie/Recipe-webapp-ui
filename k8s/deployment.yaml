apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: recipe-webapp
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/YOUR_USERNAME/recipe-ui:latest # TO-DO: replace with ACR
          ports:
            - containerPort: 3000

          env:
            # Backend service inside Kubernetes (NOT localhost)
            - name: REACT_APP_BACKEND_URL
              value: "http://backend:8080"

          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10

#----------------

apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: recipe-webapp
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP